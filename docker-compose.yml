services:
  postgres:
    image: postgres:16-alpine
    container_name: intracorp-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PUBLIC_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - intracorp_net

  backend:
    image: intracorp-helpdesk-backend:local
    build:
      context: ./backend
    container_name: intracorp-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      CORS_ORIGIN: ${PUBLIC_URL:-http://localhost:8080}
    volumes:
      - ./logs/backend:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - intracorp_net

  frontend:
    image: intracorp-helpdesk-frontend:local
    build:
      context: ./frontend
    container_name: intracorp-frontend
    restart: unless-stopped
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - intracorp_net

  nginx:
    image: nginx:1.27-alpine
    container_name: intracorp-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PUBLIC_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - intracorp_net

volumes:
  postgres_data:

networks:
  intracorp_net:
    driver: bridge
